<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#05020b" />
    <title>Space Game</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05020b;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }

      #app {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      /* HUD */
      .hud {
        position: absolute;
        inset: 0;
        pointer-events: none;
        padding: max(env(safe-area-inset-top), 12px)
          max(env(safe-area-inset-right), 16px)
          max(env(safe-area-inset-bottom), 12px)
          max(env(safe-area-inset-left), 16px);
        font-feature-settings: "tnum";
      }

      .hud-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        font-variant-numeric: tabular-nums;
      }

      .hud-pill {
        background: rgba(5, 2, 11, 0.55);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        padding: 6px 14px;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.05em;
      }

      .hud-score {
        color: #ffd86b;
      }

      .hud-health {
        display: flex;
        gap: 5px;
        align-items: center;
      }

      .hp-pip {
        width: 14px;
        height: 14px;
        border-radius: 4px;
        background: #ef4444;
        box-shadow: 0 0 12px rgba(239, 68, 68, 0.6);
        transition: background 0.18s, box-shadow 0.18s, transform 0.18s;
      }

      .hp-pip.off {
        background: rgba(255, 255, 255, 0.08);
        box-shadow: none;
        transform: scale(0.85);
      }

      /* Virtual joystick + fire zone */
      .touch-zones {
        position: absolute;
        inset: 0;
        display: flex;
        pointer-events: none;
      }

      .touch-zone {
        flex: 1;
        pointer-events: auto;
      }

      /* Static visible joystick — always on, bottom-left, respects safe-area */
      .joystick {
        position: absolute;
        left: calc(max(env(safe-area-inset-left), 16px) + 20px);
        bottom: calc(max(env(safe-area-inset-bottom), 16px) + 20px);
        width: 140px;
        height: 140px;
        border-radius: 50%;
        border: 2px solid rgba(110, 231, 183, 0.55);
        background: radial-gradient(
          circle,
          rgba(110, 231, 183, 0.14),
          rgba(110, 231, 183, 0.04)
        );
        box-shadow: 0 0 22px rgba(110, 231, 183, 0.22),
          inset 0 0 12px rgba(110, 231, 183, 0.08);
        pointer-events: none;
        opacity: 0.75;
        transition: opacity 0.12s, transform 0.12s;
      }

      .joystick.active {
        opacity: 1;
        transform: scale(1.02);
      }

      .joystick-knob {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 62px;
        height: 62px;
        margin: 0;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(
          circle,
          rgba(110, 231, 183, 0.95),
          rgba(110, 231, 183, 0.4)
        );
        box-shadow: 0 0 22px rgba(110, 231, 183, 0.8),
          inset 0 0 10px rgba(255, 255, 255, 0.25);
      }

      .fire-ring {
        position: absolute;
        right: calc(max(env(safe-area-inset-right), 16px) + 28px);
        bottom: calc(max(env(safe-area-inset-bottom), 16px) + 28px);
        width: 94px;
        height: 94px;
        border-radius: 50%;
        border: 2px solid rgba(244, 114, 182, 0.55);
        background: rgba(244, 114, 182, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(244, 114, 182, 0.95);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.18em;
        pointer-events: none;
        box-shadow: 0 0 22px rgba(244, 114, 182, 0.25),
          inset 0 0 12px rgba(244, 114, 182, 0.1);
      }

      /* Death screen */
      .overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          circle at center,
          rgba(139, 0, 30, 0.45),
          rgba(5, 2, 11, 0.85)
        );
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        pointer-events: auto;
        animation: fadeIn 0.4s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .overlay h1 {
        font-size: 42px;
        font-weight: 900;
        margin: 0 0 8px;
        letter-spacing: 0.02em;
        color: #fff;
        text-shadow: 0 0 30px rgba(239, 68, 68, 0.6);
      }

      .overlay p {
        font-size: 15px;
        color: rgba(255, 255, 255, 0.7);
        margin: 0 0 28px;
      }

      .overlay .final-score {
        font-size: 56px;
        font-weight: 900;
        color: #ffd86b;
        text-shadow: 0 0 30px rgba(255, 216, 107, 0.6);
        margin-bottom: 24px;
        font-variant-numeric: tabular-nums;
      }

      .overlay .restart-btn {
        background: linear-gradient(180deg, #7c3aed, #5b21b6);
        color: #fff;
        border: none;
        padding: 14px 38px;
        border-radius: 999px;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.06em;
        cursor: pointer;
        box-shadow: 0 8px 30px rgba(124, 58, 237, 0.5);
      }

      .overlay .restart-btn:active {
        transform: scale(0.97);
      }

      /* Damage flash */
      .damage-flash {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          circle at center,
          transparent 40%,
          rgba(239, 68, 68, 0.6) 100%
        );
        opacity: 0;
      }

      .damage-flash.flash {
        animation: damageFlash 0.35s ease-out;
      }

      @keyframes damageFlash {
        0% {
          opacity: 0.9;
        }
        100% {
          opacity: 0;
        }
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>
      <div class="hud">
        <div class="hud-top">
          <div class="hud-pill hud-score">SCORE <span id="score">0</span></div>
          <div class="hud-pill hud-health" id="health">
            <div class="hp-pip"></div>
            <div class="hp-pip"></div>
            <div class="hp-pip"></div>
            <div class="hp-pip"></div>
            <div class="hp-pip"></div>
          </div>
        </div>
      </div>
      <div class="touch-zones">
        <div class="touch-zone" id="zone-left"></div>
        <div class="touch-zone" id="zone-right"></div>
      </div>
      <div class="joystick" id="joystick">
        <div class="joystick-knob" id="joystick-knob"></div>
      </div>
      <div class="fire-ring">FIRE</div>
      <div class="damage-flash" id="damage-flash"></div>
      <div class="overlay hidden" id="death-screen">
        <h1>SHIP LOST</h1>
        <p>Final score</p>
        <div class="final-score" id="final-score">0</div>
        <button class="restart-btn" id="restart-btn">LAUNCH AGAIN</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
